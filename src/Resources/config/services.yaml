parameters:
    app_layer.default_deserialize_group: null

services:
    # === Contract aliases ===
    Elrise\Bundle\AppLayerBundle\Contract\DataProcessorInterface:
        alias: Elrise\Bundle\AppLayerBundle\Processor\DataProcessor

    Elrise\Bundle\AppLayerBundle\Contract\DtoDeserializerInterface:
        alias: Elrise\Bundle\AppLayerBundle\Serialization\SymfonyDtoDeserializer

    Elrise\Bundle\AppLayerBundle\Serialization\SymfonyDtoDeserializer:
        arguments:
            $defaultGroup: '%app_layer.default_deserialize_group%'

    Elrise\Bundle\AppLayerBundle\Contract\RequestSanitizerInterface:
        alias: Elrise\Bundle\AppLayerBundle\Handler\RequestSanitizer

    Elrise\Bundle\AppLayerBundle\Contract\RequestToDtoConverterInterface:
        alias: Elrise\Bundle\AppLayerBundle\Handler\DefaultRequestToDtoConverter

    # DtoQueueDispatcherInterface is registered conditionally by AppLayerProcessorExtension
    # (MessengerQueueDispatcher when symfony/messenger is installed, NullQueueDispatcher otherwise).

    # === DependencyInjection ===
    Elrise\Bundle\AppLayerBundle\DependencyInjection\AppLayerProcessorExtension: ~

    # === Exception ===
    Elrise\Bundle\AppLayerBundle\Exception\RequestException: ~

    # === Handler ===
    Elrise\Bundle\AppLayerBundle\Handler\DtoRequestHandler:
        arguments:
            $commandLocator: !tagged_locator { tag: 'app_layer.command_handler' }
            $queryLocator: !tagged_locator { tag: 'app_layer.query_handler' }
            $dtoConverter: '@Elrise\Bundle\AppLayerBundle\Handler\DefaultRequestToDtoConverter'
            $queueDispatcher: '@Elrise\Bundle\AppLayerBundle\Dispatcher\DtoQueueDispatcherInterface'
            $requestSanitizer: '@?Elrise\Bundle\AppLayerBundle\Handler\RequestSanitizer'
            $logger: '@?logger'

    Elrise\Bundle\AppLayerBundle\Handler\DefaultRequestToDtoConverter:
        arguments:
            $deserializer: '@Elrise\Bundle\AppLayerBundle\Serialization\SymfonyDtoDeserializer'

    Elrise\Bundle\AppLayerBundle\Handler\RequestSanitizer: ~

    # === Dispatcher ===
    Elrise\Bundle\AppLayerBundle\Dispatcher\MessengerQueueDispatcher:
        arguments:
            $messageBus: '@?messenger.default_bus'

    Elrise\Bundle\AppLayerBundle\Dispatcher\NullQueueDispatcher: ~

    # === Processor ===
    Elrise\Bundle\AppLayerBundle\Processor\DataProcessor:
        arguments:
            $locator: !tagged_locator { tag: 'app_layer.data_processor' }
